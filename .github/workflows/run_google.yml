name: Test Google Drive OAuth Upload

# Запуск вручную по кнопке из вкладки Actions
on:
  workflow_dispatch:

jobs:
  test_upload:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем текущее содержимое репозитория (вместе с вашими отчетами)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Разворачиваем Python окружение
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Ставим необходимые библиотеки Google
    - name: Install dependencies
      run: |
        pip install google-auth-oauthlib google-api-python-client

    # 4. Запускаем скрипт отправки самого свежего отчета
    - name: Run send_report.py
      env:
        # Передаем секрет с токеном из настроек репозитория
        GOOGLE_DRIVE_TOKEN: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
      run: |
        python send_report.py
