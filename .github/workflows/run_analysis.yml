name: run analysis workflow

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["run parser workflow"] # Имя первого процесса
    types:
      - completed

permissions:
  contents: write
  actions: write # Необходимо для вызова следующего workflow

jobs:
  analyze:
    # Запуск только если первый процесс завершился успешно
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 groq

      - name: Run media analysis script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python media_analysis.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add *_analysis_report.txt || echo "No files to add"
          git commit -m "Оновлення аналітичного звіту [skip ci]" || echo "No changes to commit"
          git push

      # ВЫЗОВ ТРЕТЬЕГО ПРОЦЕССА
      - name: Виклик відправки на Google Drive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run run_google.yml
