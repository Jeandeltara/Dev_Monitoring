name: Daily News Parser

on:
  # Настройка автоматического запуска по расписанию (в 23:30 по Киеву каждый день)
  schedule:
    - cron: '30 20 * * *'  # 20:30 по UTC — это 23:30 по Киеву
  # Кнопка для ручного запуска в интерфейсе GitHub
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Проверяем код репозитория
      uses: actions/checkout@v4

    - name: Настраиваем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil lxml

    - name: Запускаем парсер новостей
      run: python main.py

    - name: Upload Report to Google Drive via Curl
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        # 1. Записываем секрет во временный файл ключа
        echo "$GOOGLE_CREDENTIALS" > credentials.json
        
        # 2. Устанавливаем gspread для быстрой авторизации и заливки файла одной строкой Питона
        pip install gspread
        
        # 3. Короткий скрипт «на коленке», который берет наш файл и бросает в папку Диска
        python -c "
        import gspread, os, glob
        gc = gspread.service_account(filename='credentials.json')
        file_path = glob.glob('*_report.txt')[0]
        file_name = os.path.basename(file_path)
        with open(file_path, 'r', encoding='utf-8') as f:
            content = f.read()
        # Создаем текстовый файл прямо в нужной папке Гугла
        try:
            # Ищем папку и создаем там файл через gspread-клиент
            folder_id = '1HLX_PykEsDvuOpp7gGnEoTaTYN49T050'
            drive_file = gc.drive_client.files().create(
                body={'name': file_name, 'parents': [folder_id]},
                media_body=gspread.utils.MediaFileUpload(file_path, mimetype='text/plain')
            ).execute()
            print('Файл успешно улетел в Google Drive!')
        except Exception as e:
            print(f'Ошибка отправки: {e}')
        "
