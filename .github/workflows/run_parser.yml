name: Daily News Parser Only

on:
  # Автоматический запуск каждый день в 23:30 по Киеву (20:30 UTC)
  schedule:
    - cron: '30 20 * * *'
  # Кнопка для ручного запуска в интерфейсе GitHub
  workflow_dispatch:

permissions:
  contents: write          # Разрешение Гитхабу сохранять файлы в ваш репозиторий

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
    - name: Проверяем код репозитория
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Настраиваем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil lxml

    - name: Запускаем парсер новостей
      run: python main.py

    - name: Сохраняем созданный отчет в репозиторий
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add *_report.txt
        # Коммитим файл, только если он появился/изменился
        git diff --cached --quiet || git commit -m "Добавлен свежий отчет [skip ci]"
        git push origin main
