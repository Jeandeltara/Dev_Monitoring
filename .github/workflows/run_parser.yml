name: Daily News Parser

on:
  # Настройка автоматического запуска по расписанию (в 23:30 по Киеву каждый день)
  schedule:
    - cron: '30 20 * * *'  # 20:30 по UTC — это 23:30 по Киеву
  # Кнопка для ручного запуска в интерфейсе GitHub
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Проверяем код репозитория
      uses: actions/checkout@v4

    - name: Настраиваем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil lxml

    - name: Запускаем парсер новостей
      run: python main.py

    - name: Upload Report to Google Drive
      uses: jakejarvis/google-drive-upload-action@master
      with:
        credentials: ${{ secrets.GOOGLE_CREDENTIALS }} # Ваш JSON-ключ робота
        filename: "*_report.txt"                        # Ищем наш созданный текстовый файл
        folder_id: "1HLX_PykEsDvuOpp7gGnEoTaTYN49T050" # ID вашей папки
