name: Automated News Monitoring System

on:
  schedule:
    - cron: '30 20 * * *'  # Каждый день в 20:30 UTC (23:30 по Киеву) — СБОР
    - cron: '00 02 * * *'  # Каждый день в 02:00 UTC (05:00 по Киеву) — РАССЫЛКА И ОЧИСТКА
  workflow_dispatch:       # Кнопка ручного запуска

permissions:
  contents: write          # Позволяет Гитхабу делать пуш файлов в репозиторий

jobs:
  monitor-job:
    runs-on: ubuntu-latest

    steps:
    - name: Проверяем код репозитория
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Настраиваем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil lxml

    # --- БЛОК СБОРА НОВОСТЕЙ (Запускается только в 23:30 по Киеву или вручную) ---
    # github.event.schedule проверяет, какой именно cron сработал
    - name: Сбор новостей
      if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 20 * * *'
      run: python main.py

    # --- БЛОК РАССЫЛКИ И ОЧИСТКИ (Запускается только в 05:00 по Киеву или вручную) ---
    - name: Рассылка отчета
      if: github.event_name == 'workflow_dispatch' || github.event.schedule == '00 02 * * *'
      run: python send_report.py

    - name: Очистка старых отчетов
      if: github.event_name == 'workflow_dispatch' || github.event.schedule == '00 02 * * *'
      run: python clean_reports.py

    # --- БЛОК ФИКСАЦИИ ИЗМЕНЕНИЙ (Сохраняет новые файлы и удаляет старые в самом GitHub) ---
    - name: Сохраняем изменения в репозиторий
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add *_report.txt
        # Коммитим изменения, только если есть что добавлять или удалять, чтобы скрипт не падал
        git diff --cached --quiet || git commit -m "Автоматическое обновление архива отчетов [skip ci]"
        git push origin main
