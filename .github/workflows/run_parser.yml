name: Automated News Monitoring System

on:
  schedule:
    - cron: '30 20 * * *'  # Каждый день в 20:30 UTC (23:30 по Киеву)
  workflow_dispatch:       # Кнопка ручного запуска для тестов

permissions:
  contents: write          # Права на запись файлов в репозиторий

jobs:
  monitor-job:
    runs-on: ubuntu-latest

    steps:
    - name: Проверяем код репозитория
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Настраиваем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем базовые библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil lxml

    - name: Сбор новостей (Парсер)
      run: python main.py

    - name: Синхронизация файлов с репозиторием GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add *_report.txt
        # Коммитим только если появился новый файл
        git diff --cached --quiet || git commit -m "Автоматическое обновление архива отчетов [skip ci]"
        git push origin main
