name: Run parser workflow

on:
  schedule:
    - cron: '10 11 * * *'  # Каждый день в 11:10 UTC (14:10 по Киеву)
  workflow_dispatch:       # Кнопка ручного запуска для тестов

permissions:
  contents: write          # Права на запись файлов в репозиторий

jobs:
  monitor-job:
    runs-on: ubuntu-latest

    steps:
    - name: Перевірка коду репозіторія
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Налаштування Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Базові бібліотеки
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dateutil lxml

    - name: Збір новин (парсінг)
      run: python parser.py

    - name: Збереження файлів до репозіторію GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Adding reports (YYMMDD_hhmm_report.txt)
        git add *_report.txt
        
        # Commiting and ushing report files
        git diff --cached --quiet || (git commit -m "Автоматичне оновлення архіву звітів [skip ci]" && git push origin main)
