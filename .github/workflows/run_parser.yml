name: run parser workflow

on:
  schedule:
    - cron: '10 11 * * *'  # 14:10 по Киеву
  workflow_dispatch:
    inputs:
      is_scheduled:
        description: 'Запуск по расписанию'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write # Нужно для вызова других workflow через API

jobs:
  monitor-job:
    runs-on: ubuntu-latest

    steps:
      - name: Перевірка коду репозіторія
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Базові бібліотеки
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dateutil lxml

      - name: Збір новин (парсінг)
        run: python parser.py

      - name: Збереження файлів до репозіторію GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *_report.txt
          git diff --cached --quiet || (git commit -m "Автоматичне оновлення архіву звітів [skip ci]" && git push origin main)

      # ТРИГГЕР ВТОРОГО ПРОЦЕССА
      - name: Виклик аналізу (якщо це розклад)
        if: github.event_name == 'schedule' || github.event.inputs.is_scheduled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run run_analysis.yml
